<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AeroWaterOS Installer</title>

<style>
body{
margin:0;
height:100vh;
background:black;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

.box{
text-align:center;
width:400px;
}

.bar{
width:100%;
height:10px;
background:#222;
border-radius:10px;
margin-top:20px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:cyan;
transition:0.2s;
}

.big{
font-size:22px;
margin-top:10px;
color:#00d4ff;
}

.small{
opacity:0.7;
font-size:14px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="box" id="installer">

<h1>AeroWaterOS Setup</h1>

<div class="big" id="status">Preparing installation...</div>

<div class="small" id="arch">Detecting system architecture (32/64-bit)...</div>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<div class="small" id="percent">0%</div>

</div>

<script>
let p = 0;

let steps = [
"Detecting system architecture (64-bit)",
"Allocating system resources",
"Downloading AeroWaterOS files",
"Installing core modules",
"Configuring AeroWater Edge",
"Finalizing installation",
"Starting OS..."
];

let i = 0;

let progress = document.getElementById("progress");
let percent = document.getElementById("percent");
let status = document.getElementById("status");
let arch = document.getElementById("arch");

let interval = setInterval(() => {

p += Math.random() * 8;
if(p > 100) p = 100;

progress.style.width = p + "%";
percent.innerText = Math.floor(p) + "%";

if(i < steps.length && p > (i * 15)){
status.innerText = steps[i];
i++;
}

if(p >= 100){
clearInterval(interval);

status.innerText = "Launching AeroWaterOS...";

setTimeout(() => {
window.location.href = "index.html"; // 👈 LA TUA APP
}, 2000);

}

}, 200);
</script>

</body>
</html>
